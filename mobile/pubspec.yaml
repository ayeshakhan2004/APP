name: ciro
description: "Crisis Intelligence & Response Orchestrator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.6.0
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^3.3.1
  http: ^1.2.0
  geolocator: ^14.0.2
  fl_chart: ^1.2.0
  intl: ^0.20.2
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
